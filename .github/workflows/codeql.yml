name: CodeQL Analysis

# Manual trigger only — not wired to any automatic event.
# To use: GitHub → Actions → CodeQL Analysis → Run workflow
# GitHub's static analysis engine — finds security vulnerabilities in source code.
on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:go
