name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commits format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|test|refactor|perf|docs|chore|ci)(\((stack|ops|sort|parser|push-swap|checker|ci)\))?: .+"
          if echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "PR title is valid: $TITLE"
          else
            echo "ERROR: PR title does not follow Conventional Commits format."
            echo "Title: $TITLE"
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo "Types: feat, fix, test, refactor, perf, docs, chore, ci"
            echo "Scopes: stack, ops, sort, parser, push-swap, checker, ci"
            echo ""
            echo "Examples:"
            echo "  feat(stack): add IsSorted method"
            echo "  fix(sort): correct rotation for minIdx==2"
            echo "  test(ops): add table-driven tests for all 11 operations"
            exit 1
          fi
