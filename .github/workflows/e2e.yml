name: End-to-End Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          go build -o push-swap ./cmd/push-swap
          go build -o checker ./cmd/checker

      - name: No args produces no output
        run: |
          OUTPUT=$(./push-swap)
          [ -z "$OUTPUT" ] || (echo "FAIL: expected no output, got: $OUTPUT" && exit 1)

      - name: Already sorted produces no output
        run: |
          OUTPUT=$(./push-swap "0 1 2 3 4")
          [ -z "$OUTPUT" ] || (echo "FAIL: expected no output for sorted input, got: $OUTPUT" && exit 1)

      - name: Non-integer argument prints Error to stderr
        run: |
          OUTPUT=$(./push-swap "0 one 2 3" 2>&1 1>/dev/null)
          [ "$OUTPUT" = "Error" ] || (echo "FAIL: expected 'Error' on stderr, got: $OUTPUT" && exit 1)

      - name: Duplicate argument prints Error to stderr
        run: |
          OUTPUT=$(./push-swap "1 2 2 3" 2>&1 1>/dev/null)
          [ "$OUTPUT" = "Error" ] || (echo "FAIL: expected 'Error' on stderr, got: $OUTPUT" && exit 1)

      - name: n=5 sort produces fewer than 12 ops
        run: |
          COUNT=$(./push-swap "1 5 2 4 3" | wc -l)
          echo "n=5 ops: $COUNT"
          [ "$COUNT" -lt 12 ] || (echo "FAIL: n=5 used $COUNT ops (limit: <12)" && exit 1)

      - name: n=6 sort produces fewer than 9 ops
        run: |
          COUNT=$(./push-swap "2 1 3 6 5 8" | wc -l)
          echo "n=6 ops: $COUNT"
          [ "$COUNT" -lt 9 ] || (echo "FAIL: n=6 used $COUNT ops (limit: <9)" && exit 1)

      - name: push-swap output verified by checker
        run: |
          ARG="4 67 3 87 23"
          RESULT=$(./push-swap "$ARG" | ./checker "$ARG")
          [ "$RESULT" = "OK" ] || (echo "FAIL: checker returned $RESULT" && exit 1)

      - name: checker returns OK for valid instruction sequence
        run: |
          RESULT=$(echo -e "pb\nra\npb\nra\nsa\nra\npa\npa\n" | ./checker "0 9 1 8 2")
          [ "$RESULT" = "OK" ] || (echo "FAIL: checker returned $RESULT, expected OK" && exit 1)

      - name: checker returns KO for invalid instruction sequence
        run: |
          RESULT=$(echo -e "sa\npb\nrrr\n" | ./checker "0 9 1 8 2 7 3 6 4 5")
          [ "$RESULT" = "KO" ] || (echo "FAIL: checker returned $RESULT, expected KO" && exit 1)

      - name: checker prints Error for invalid instruction
        run: |
          OUTPUT=$(echo -e "invalid\n" | ./checker "1 2 3" 2>&1 1>/dev/null)
          [ "$OUTPUT" = "Error" ] || (echo "FAIL: expected 'Error' on stderr, got: $OUTPUT" && exit 1)

      - name: n=100 sort produces fewer than 700 ops
        run: |
          MAX=0
          for i in $(seq 5); do
            ARG=$(shuf -i 1-10000 -n 100 | tr '\n' ' ')
            COUNT=$(./push-swap "$ARG" | wc -l)
            [ "$COUNT" -gt "$MAX" ] && MAX=$COUNT
          done
          echo "n=100 worst case: $MAX ops"
          [ "$MAX" -lt 700 ] || (echo "FAIL: n=100 used $MAX ops (limit: <700)" && exit 1)
